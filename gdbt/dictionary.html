<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictionary — DBT Gaua Languages</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Dictionary page ── */
.dict-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: calc(100vh - 52px - 80px);
}

/* Alpha sidebar */
.alpha-sidebar {
  background: #faf6ef;
  border-right: 1px solid var(--border);
  padding: 1.4rem 0.8rem 2rem;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.alpha-sidebar h2 {
  font-family: 'Crimson Pro', serif;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.8rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  padding-left: 4px;
}
.alpha-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 1.4rem;
}
.alpha-list a {
  display: inline-block;
  width: 30px; height: 30px;
  line-height: 30px;
  text-align: center;
  font-family: 'EB Garamond', serif;
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--ink-mid);
  text-decoration: none;
  border-radius: 3px;
  transition: background 0.15s, color 0.15s;
}
.alpha-list a:hover, .alpha-list a.active {
  background: #1c0f06;
  color: #f0dfc0;
}
.alpha-list a.inactive {
  color: var(--border);
  pointer-events: none;
}

/* Search box */
.dict-searchbox {
  padding: 1rem 1rem 0;
  position: sticky;
  top: 52px;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.dict-searchbox input {
  width: 100%;
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  padding: 0.5rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 0.7rem;
}
.dict-searchbox input:focus { border-color: var(--gold); }
.dict-searchbox input::placeholder { color: #c0b090; font-style: italic; }
.filter-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.8rem;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: 'Crimson Pro', serif;
  font-size: 0.82rem;
  padding: 3px 12px 4px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: white;
  color: var(--ink-mid);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.filter-btn.active {
  background: #1c0f06;
  border-color: #1c0f06;
  color: #f0dfc0;
}
.filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

/* Main dictionary area */
.dict-main {
  padding: 0;
  overflow-y: auto;
}
.dict-content { padding: 0 3rem 4rem; }

/* Letter heading */
.letter-group { margin-top: 2.5rem; scroll-margin-top: 112px; }
.letter-heading {
  font-family: 'EB Garamond', serif;
  font-size: 2rem;
  font-weight: 500;
  color: var(--ink);
  border-bottom: 2px solid var(--gold);
  padding-bottom: 0.2rem;
  margin-bottom: 1rem;
  display: inline-block;
  min-width: 2rem;
}

/* Entry card */
.entry {
  display: grid;
  grid-template-columns: 1fr;
  border-bottom: 1px solid var(--border-lt);
  padding: 1rem 0 1.1rem;
  scroll-margin-top: 120px;
  transition: background 0.15s;
}
.entry:hover { background: #fffdf5; }
.entry.highlighted {
  background: #fffaec;
  border-left: 3px solid var(--gold);
  padding-left: 1rem;
  margin-left: -1rem;
  border-radius: 0 4px 4px 0;
}

/* Entry header row */
.entry-header {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.3rem;
}
.headword {
  font-family: 'EB Garamond', serif;
  font-size: 1.75rem;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.pos-tag {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--ink-light);
  font-variant: small-caps;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 0 5px;
  line-height: 1.4;
}
.domain-tag {
  font-family: 'Crimson Pro', serif;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: white;
  background: var(--gold);
  border-radius: 2px;
  padding: 1px 7px 2px;
}

/* Gloss line */
.entry-gloss {
  font-family: 'Crimson Pro', serif;
  font-size: 1.08rem;
  color: var(--ink-mid);
  line-height: 1.7;
  margin-bottom: 0.4rem;
}
.entry-gloss em { font-style: italic; }

/* Notes */
.entry-notes {
  font-family: 'Crimson Pro', serif;
  font-size: 0.95rem;
  color: var(--ink-light);
  font-style: italic;
  line-height: 1.65;
  margin-bottom: 0.6rem;
}
.entry-notes a { color: var(--gold); border-bottom: 1px dotted var(--gold-lt); text-decoration:none; }
.entry-notes a:hover { color: #b84c10; }

/* Cross-language table */
.lang-table {
  border-collapse: collapse;
  margin: 0.5rem 0 0.6rem;
  font-size: 0.9rem;
  border: 1px solid var(--border-lt);
  border-radius: 3px;
  overflow: hidden;
  background: white;
}
.lang-table th {
  background: #f0e8d8;
  font-family: 'Crimson Pro', serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mid);
  padding: 4px 12px;
  text-align: left;
  border-right: 1px solid var(--border-lt);
}
.lang-table td {
  padding: 4px 12px;
  font-family: 'Source Code Pro', monospace;
  font-size: 0.88rem;
  color: var(--ink);
  border-right: 1px solid var(--border-lt);
}
.lang-table th:last-child, .lang-table td:last-child { border-right: none; }
.lang-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}

/* Examples */
.entry-examples { margin-top: 0.5rem; }
.ex-header {
  font-family: 'Crimson Pro', serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.4rem;
}
.entry-ex {
  background: #faf6ef;
  border-left: 2.5px solid var(--border);
  border-radius: 0 3px 3px 0;
  padding: 0.5rem 1rem;
  margin-bottom: 0.5rem;
  display: inline-block;
  min-width: 200px;
}
.entry-ex .ex-form {
  font-family: 'EB Garamond', serif;
  font-size: 1.08rem;
  color: var(--ink);
  font-style: italic;
}
.entry-ex .ex-gloss {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.7rem;
  color: var(--ink-light);
  letter-spacing: 0.03em;
  display: block;
  margin-top: 1px;
}
.entry-ex .ex-transl {
  font-family: 'Crimson Pro', serif;
  font-size: 0.95rem;
  color: var(--ink-mid);
  margin-top: 2px;
  font-style: italic;
}

/* Result count */
.result-count {
  font-family: 'Crimson Pro', serif;
  font-size: 0.85rem;
  color: var(--ink-light);
  padding: 0.5rem 3rem 0.5rem;
  background: var(--bg);
  border-bottom: 1px solid var(--border-lt);
  position: sticky;
  top: 110px;
  z-index: 5;
}

/* No results */
.no-results {
  padding: 3rem;
  font-family: 'Crimson Pro', serif;
  font-size: 1.05rem;
  color: var(--ink-light);
  font-style: italic;
}
</style>
</head>
<body id="top">

<nav class="topnav">
  <a class="topnav-brand" href="index.html">◬ DBT Gaua</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="grammar.html">Grammar</a></li>
    <li><a href="texts.html">Texts</a></li>
    <li><a href="dictionary.html" class="active">Dictionary</a></li>
  </ul>
  <div class="topnav-right">Comparative Lexicon · 5 Languages</div>
</nav>

<div class="dict-layout">
  <!-- Alpha sidebar -->
  <aside class="alpha-sidebar">
    <h2>Index</h2>
    <div class="alpha-list" id="alpha-index"></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:0.8rem 0;">
    <h2>Part of speech</h2>
    <div id="pos-filter" style="display:flex;flex-direction:column;gap:4px;"></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:0.8rem 0;">
    <div style="font-family:'Crimson Pro',serif;font-size:0.78rem;color:var(--ink-light);line-height:1.6;">
      <strong style="color:var(--ink-mid);">Languages</strong><br>
      <span class="lang-dot" style="background:#2e5c8a;"></span>Nume<br>
      <span class="lang-dot" style="background:#c07820;"></span>Dorig<br>
      <span class="lang-dot" style="background:#922810;"></span>Koro<br>
      <span class="lang-dot" style="background:#267040;"></span>Olrat<br>
      <span class="lang-dot" style="background:#5c2878;"></span>Lakon
    </div>
  </aside>

  <!-- Main -->
  <main class="dict-main">
    <!-- Search -->
    <div class="dict-searchbox">
      <input type="search" id="search-input" placeholder="Search headword or meaning…" autocomplete="off">
      <div class="filter-row" id="domain-filter"></div>
    </div>
    <div class="result-count" id="result-count"></div>
    <div class="dict-content" id="dict-content"></div>
  </main>
</div>

<footer>
  LACITO &nbsp;/&nbsp; Pangloss Collection &nbsp;·&nbsp; CNRS &nbsp;·&nbsp;
  Documentation: Alexandre François &nbsp;·&nbsp;
  Gaua Island, Banks Islands, Vanuatu &nbsp;·&nbsp;
  <a href="https://pangloss.cnrs.fr" target="_blank">pangloss.cnrs.fr</a>
</footer>

<script src="data.js"></script>
<script>
const LANG_DOTS = { Nume:"#2e5c8a", Dorig:"#c07820", Koro:"#922810", Olrat:"#267040", Lakon:"#5c2878" };
const TARGET_WORD = new URLSearchParams(location.search).get('word') || '';

// ── State ─────────────────────────────────────────────────────
let searchQ  = '';
let activePOS = 'All';
let activeDomain = 'All';

// ── Build filter controls ─────────────────────────────────────
const allPOS     = ['All', ...new Set(DICTIONARY.map(e => e.pos))].sort();
const allDomains = ['All', ...new Set(DICTIONARY.map(e => e.domain))].sort();

// POS (sidebar)
const posDiv = document.getElementById('pos-filter');
allPOS.forEach(p => {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (p === 'All' ? ' active' : '');
  b.textContent = p;
  b.dataset.pos = p;
  b.addEventListener('click', () => {
    activePOS = p;
    posDiv.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x.dataset.pos === p));
    render();
  });
  posDiv.appendChild(b);
});

// Domain (top bar)
const domDiv = document.getElementById('domain-filter');
allDomains.forEach(d => {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (d === 'All' ? ' active' : '');
  b.textContent = d;
  b.dataset.dom = d;
  b.addEventListener('click', () => {
    activeDomain = d;
    domDiv.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x.dataset.dom === d));
    render();
  });
  domDiv.appendChild(b);
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  render();
});
if (TARGET_WORD) {
  document.getElementById('search-input').value = TARGET_WORD;
  searchQ = TARGET_WORD.toLowerCase();
}

// ── Filter ────────────────────────────────────────────────────
function filtered() {
  return DICTIONARY.filter(e => {
    const q = searchQ;
    const matchQ = !q
      || e.hw.toLowerCase().includes(q)
      || e.gloss.toLowerCase().replace(/<[^>]+>/g,'').includes(q)
      || Object.values(e.langs).some(v => v.toLowerCase().includes(q));
    const matchPOS = activePOS === 'All' || e.pos === activePOS;
    const matchDom = activeDomain === 'All' || e.domain === activeDomain;
    return matchQ && matchPOS && matchDom;
  });
}

// ── Alpha index ────────────────────────────────────────────────
const alphaDiv = document.getElementById('alpha-index');
function buildAlpha(entries) {
  const letters = new Set(entries.map(e => e.hw[0].toUpperCase()));
  alphaDiv.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    const a = document.createElement('a');
    a.textContent = l;
    if (letters.has(l)) {
      a.href = '#letter-' + l;
    } else {
      a.className = 'inactive';
    }
    alphaDiv.appendChild(a);
  });
}

// ── Entry HTML ────────────────────────────────────────────────
function entryHTML(e) {
  const hl = (e.id === TARGET_WORD || e.hw === TARGET_WORD || e.id === searchQ) ? ' highlighted' : '';
  const langCells = ['Nume','Dorig','Koro','Olrat','Lakon'].map(ln =>
    `<th><span class="lang-dot" style="background:${LANG_DOTS[ln]}"></span>${ln}</th>`
  ).join('');
  const langVals = ['Nume','Dorig','Koro','Olrat','Lakon'].map(ln =>
    `<td>${e.langs[ln] || '—'}</td>`
  ).join('');

  const exHTML = e.examples.map(ex => {
    const langColor = LANG_DOTS[ex.lang] || '#888';
    return `<div class="entry-ex">
      <span class="chip" style="background:${langColor};margin-bottom:5px;display:inline-block;">${ex.lang}</span>
      <span class="ex-form">${ex.form}</span>
      <span class="ex-gloss">${ex.gloss}</span>
      <div class="ex-transl">'${ex.transl}'</div>
    </div>`;
  }).join('');

  return `<div class="entry${hl}" id="${e.id}">
    <div class="entry-header">
      <span class="headword">${e.hw}</span>
      <span class="pos-tag">${e.pos}</span>
      <span class="domain-tag">${e.domain}</span>
    </div>
    <div class="entry-gloss">${e.gloss}</div>
    <table class="lang-table">
      <thead><tr>${langCells}</tr></thead>
      <tbody><tr>${langVals}</tr></tbody>
    </table>
    <div class="entry-notes">${e.notes}</div>
    ${e.examples.length ? `<div class="entry-examples">
      <div class="ex-header">Examples</div>
      ${exHTML}
    </div>` : ''}
  </div>`;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const entries = filtered();
  const content = document.getElementById('dict-content');
  const countEl = document.getElementById('result-count');
  countEl.textContent = entries.length + ' entr' + (entries.length===1?'y':'ies');

  if (entries.length === 0) {
    content.innerHTML = '<div class="no-results">No entries found.</div>';
    buildAlpha([]);
    return;
  }
  buildAlpha(entries);

  // Group by first letter
  const groups = {};
  entries.forEach(e => {
    const l = e.hw[0].toUpperCase();
    if (!groups[l]) groups[l] = [];
    groups[l].push(e);
  });

  let html = '';
  Object.keys(groups).sort().forEach(l => {
    html += `<div class="letter-group" id="letter-${l}">
      <div class="letter-heading">${l}</div>
      ${groups[l].map(entryHTML).join('')}
    </div>`;
  });
  content.innerHTML = html;

  // Scroll to highlighted entry
  if (TARGET_WORD && !searchQ.length) return;
  const hl = content.querySelector('.highlighted');
  if (hl) setTimeout(() => hl.scrollIntoView({ behavior:'smooth', block:'center' }), 120);
}

render();

// Highlight active alpha letter on scroll
const alphaLinks = () => alphaDiv.querySelectorAll('a:not(.inactive)');
const dictMain = document.querySelector('.dict-main');
dictMain.addEventListener('scroll', () => {
  const groups = document.querySelectorAll('.letter-group');
  let active = null;
  groups.forEach(g => {
    if (g.getBoundingClientRect().top < 160) active = g.id.replace('letter-','');
  });
  alphaLinks().forEach(a => {
    a.classList.toggle('active', a.textContent === active);
  });
});
</script>
</body>
