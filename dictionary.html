<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictionary — DBT Gaua Languages</title>
<link rel="stylesheet" href="style.css">
<style>
.dict-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: calc(100vh - 52px - 80px);
}
.alpha-sidebar {
  background: #faf6ef;
  border-right: 1px solid var(--border);
  padding: 1.4rem 0.8rem 2rem;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}
.alpha-sidebar h2 {
  font-family: 'Crimson Pro', serif; font-size: 0.7rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.8rem;
  padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); padding-left: 4px;
}
.alpha-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1.4rem; }
.alpha-list a {
  display: inline-block; width: 30px; height: 30px; line-height: 30px; text-align: center;
  font-family: 'EB Garamond', serif; font-size: 1.05rem; font-weight: 500; color: var(--ink-mid);
  text-decoration: none; border-radius: 3px; transition: background 0.15s, color 0.15s;
}
.alpha-list a:hover, .alpha-list a.active { background: #1c0f06; color: #f0dfc0; }
.alpha-list a.inactive { color: var(--border); pointer-events: none; }

.dict-searchbox {
  padding: 0.85rem 1rem 0;
  position: sticky; top: 52px; background: var(--bg); z-index: 10;
  border-bottom: 1px solid var(--border);
}

.lang-selector-row {
  display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap;
}
.lang-selector-label {
  font-family: 'Crimson Pro', serif; font-size: 0.78rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-light); white-space: nowrap; flex-shrink: 0;
}
.lang-sel-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Crimson Pro', serif; font-variant: small-caps;
  font-size: 0.85rem; font-weight: 600; letter-spacing: 0.07em;
  padding: 3px 11px 4px; border-radius: 3px; border: 1.5px solid transparent;
  cursor: pointer; color: white; transition: opacity 0.15s, box-shadow 0.15s; opacity: 0.45;
}
.lang-sel-btn.active { opacity: 1; box-shadow: 0 0 0 2px white, 0 0 0 3.5px currentColor; }
.lang-sel-btn:hover { opacity: 0.85; }

.dict-searchbox input {
  width: 100%; font-family: 'EB Garamond', serif; font-size: 1rem;
  padding: 0.5rem 0.9rem; border: 1px solid var(--border); border-radius: 4px;
  background: white; color: var(--ink); outline: none;
  transition: border-color 0.15s; margin-bottom: 0.7rem;
}
.dict-searchbox input:focus { border-color: var(--gold); }
.dict-searchbox input::placeholder { color: #c0b090; font-style: italic; }
.filter-row { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
.filter-btn {
  font-family: 'Crimson Pro', serif; font-size: 0.82rem; padding: 3px 12px 4px;
  border: 1px solid var(--border); border-radius: 3px; background: white; color: var(--ink-mid);
  cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.filter-btn.active { background: #1c0f06; border-color: #1c0f06; color: #f0dfc0; }
.filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

.dict-main { padding: 0; overflow-y: auto; }
.dict-content { padding: 0 3rem 4rem; }
.result-count {
  font-family: 'Crimson Pro', serif; font-size: 0.85rem; color: var(--ink-light);
  padding: 0.5rem 3rem; background: var(--bg); border-bottom: 1px solid var(--border-lt);
  position: sticky; top: 110px; z-index: 5;
}
.no-results { padding: 3rem; font-family: 'Crimson Pro', serif; font-size: 1.05rem; color: var(--ink-light); font-style: italic; }

.letter-group { margin-top: 2.5rem; scroll-margin-top: 112px; }
.letter-heading {
  font-family: 'EB Garamond', serif; font-size: 2rem; font-weight: 500; color: var(--ink);
  border-bottom: 2px solid var(--gold); padding-bottom: 0.2rem; margin-bottom: 1rem;
  display: inline-block; min-width: 2rem;
}

/* Entry */
.entry {
  border-bottom: 1px solid var(--border-lt); padding: 1.1rem 0 1.3rem;
  scroll-margin-top: 120px; transition: background 0.15s;
}
.entry:hover { background: #fffdf5; }
.entry.highlighted {
  background: #fffaec; border-left: 3px solid var(--gold);
  padding-left: 1rem; margin-left: -1rem; border-radius: 0 4px 4px 0;
}
.entry-header { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.4rem; }
.headword { font-family: 'EB Garamond', serif; font-size: 1.75rem; font-weight: 500; color: var(--ink); letter-spacing: -0.02em; }
.pos-tag {
  font-family: 'Crimson Pro', serif; font-style: italic; font-size: 0.9rem; color: var(--ink-light);
  font-variant: small-caps; border: 1px solid var(--border); border-radius: 2px; padding: 0 5px; line-height: 1.4;
}
.domain-tag {
  font-family: 'Crimson Pro', serif; font-size: 0.75rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: white; background: var(--gold); border-radius: 2px; padding: 1px 7px 2px;
}

/* ── Etymology tag ── */
.etym-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Crimson Pro', serif;
  font-size: 0.82rem;
  color: #4a3060;
  background: #f0eaf8;
  border: 1px solid #c8b0e0;
  border-radius: 3px;
  padding: 1px 8px 2px;
  text-decoration: none;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.etym-tag:hover { background: #4a3060; color: white; border-color: #4a3060; }
.etym-tag .etym-prefix {
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.65;
  margin-right: 1px;
}
.etym-tag .etym-form {
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  font-style: italic;
}

/* Etymograph icon link */
.etymograph-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 3px;
  border: 1px solid #c8b0e0;
  background: #f0eaf8;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s;
  vertical-align: middle;
  flex-shrink: 0;
  overflow: hidden;
}
.etymograph-link:hover { background: #4a3060; border-color: #4a3060; }
.etymograph-link img {
  width: 14px;
  height: 14px;
  object-fit: contain;
  opacity: 0.6;
  transition: opacity 0.15s, filter 0.15s;
}
.etymograph-link:hover img { opacity: 1; filter: brightness(10); }

.entry-gloss { font-family: 'Crimson Pro', serif; font-size: 1.08rem; color: var(--ink-mid); line-height: 1.7; margin-bottom: 0.5rem; }
.entry-gloss em { font-style: italic; }
.entry-notes {
  font-family: 'Crimson Pro', serif; font-size: 0.95rem; color: var(--ink-light);
  font-style: italic; line-height: 1.65; margin-bottom: 0.8rem; max-width: 66ch;
}

/* Cross-language forms table */
.lang-table {
  border-collapse: collapse; margin: 0.2rem 0 0.3rem; font-size: 0.9rem;
  border: 1px solid var(--border-lt); border-radius: 3px; overflow: hidden; background: white;
}
.lang-table th {
  background: #f0e8d8; font-family: 'Crimson Pro', serif; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mid);
  padding: 5px 14px; text-align: left; border-right: 1px solid var(--border-lt);
}
.lang-table td {
  padding: 5px 14px; font-family: 'EB Garamond', serif; font-size: 1.1rem; color: var(--ink);
  border-right: 1px solid var(--border-lt);
}
.lang-table th:last-child, .lang-table td:last-child { border-right: none; }
.lang-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

/* "See in grammar" badge */
.grammar-ref {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Crimson Pro', serif; font-size: 0.82rem;
  color: #2a4a6a; border: 1px solid #a0bcd0; border-radius: 3px;
  padding: 2px 10px 3px; text-decoration: none; margin-top: 0.5rem;
  transition: background 0.15s, color 0.15s;
}
.grammar-ref:hover { background: #2a4a6a; color: white; border-color: #2a4a6a; }

/* ── Contextual example block ── */
.entry-example-block { margin-top: 0.9rem; }
.entry-example-label {
  font-family: 'Crimson Pro', serif; font-size: 0.72rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.4rem;
}
.entry-example-wrap {
  background: #faf6ef; border-left: 3px solid var(--gold); border-radius: 0 5px 5px 0;
  padding: 0.7rem 1.1rem 0.75rem; display: block;
  max-width: 100%; overflow-x: auto;
}
.entry-ex-table { border-collapse: collapse; font-size: 0.95rem; white-space: nowrap; }
.entry-ex-table .ex-lang-abbr {
  font-family: 'Crimson Pro', serif; font-variant: small-caps; font-size: 0.85rem;
  font-weight: 600; letter-spacing: 0.06em; color: var(--ink-light);
  padding: 2px 16px 2px 0; vertical-align: baseline; border: none;
}
.entry-ex-table .ex-form-cell { padding: 2px 18px 2px 0; vertical-align: baseline; border: none; }
.entry-ex-table .ex-form-cell.ex-empty { font-family: 'EB Garamond', serif; font-size: 1.15rem; color: #ccc; }
.entry-ex-table .ex-form-cell a.lexlink:hover {
  color: #b84c10 !important; border-bottom-color: #b84c10 !important; background: #fff5e8;
}
.entry-ex-table .ex-sep-row td { border-top: 1px solid var(--border); padding: 0; height: 0; border-bottom: none; }
.entry-ex-table .ex-gloss-abbr { padding: 5px 16px 3px 0; border: none; vertical-align: baseline; }
.entry-ex-table .ex-gloss-cell {
  font-family: 'Source Code Pro', monospace; font-size: 0.66rem; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--ink-light);
  padding: 5px 18px 3px 0; vertical-align: baseline; border: none; white-space: nowrap;
}
.entry-ex-transl {
  font-family: 'Crimson Pro', serif; font-style: italic; font-size: 1rem;
  color: var(--ink-mid); margin-top: 5px;
}

/* Tooltip */
#lex-tooltip { position: fixed; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.1s ease; max-width: 300px; }
#lex-tooltip.visible { opacity: 1; }
#lex-tooltip .tt-inner {
  background: #1c0f06; color: #f0dfc0; border-radius: 5px; padding: 9px 14px 10px;
  box-shadow: 0 4px 18px rgba(0,0,0,.35), 0 0 0 1px rgba(201,164,88,.25);
  font-family: 'Crimson Pro', serif; font-size: 0.9rem; line-height: 1.5;
}
#lex-tooltip .tt-hw  { font-family: 'EB Garamond', serif; font-size: 1.15rem; font-weight: 500; color: #fdeec8; margin-right: 6px; }
#lex-tooltip .tt-pos { font-style: italic; font-size: 0.78rem; color: #c9a458; }
#lex-tooltip .tt-gloss { color: #e8d0a8; margin-top: 3px; font-size: 0.88rem; }
</style>

  <aside class="alpha-sidebar">
    <h2>Index</h2>

      <strong style="color:var(--ink-mid);">Languages</strong><br>
      <span class="lang-dot" style="background:#2e5c8a;"></span>Nume &nbsp;
      <span class="lang-dot" style="background:#c07820;"></span>Dorig<br>
      <span class="lang-dot" style="background:#922810;"></span>Koro &nbsp;

        <button class="lang-sel-btn"        data-lang="Dorig" style="background:#c07820;color:white;">Dorig</button>
        <button class="lang-sel-btn"        data-lang="Olrat" style="background:#267040;color:white;">Olrat</button>
        <button class="lang-sel-btn"        data-lang="Lakon" style="background:#5c2878;color:white;">Lakon</button>
      </div>
      <input type="search" id="search-input" placeholder="Search headword or meaning…" autocomplete="off">

<script src="data.js"></script>
<script>
const LANG_DOTS = { Nume:"#2e5c8a", Dorig:"#c07820", Koro:"#922810", Olrat:"#267040", Lakon:"#5c2878" };
const DICT_MAP  = {};
DICTIONARY.forEach(e => { DICT_MAP[e.id] = e; });

const TARGET = location.hash.slice(1) || new URLSearchParams(location.search).get('word') || '';

let activeLang   = 'Koro';
let activeDomain = 'All';
let searchQ      = '';

document.querySelectorAll('.lang-sel-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeLang = btn.dataset.lang;
    document.querySelectorAll('.lang-sel-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === activeLang)
    );
    render();
  });
});

const allDomains = ['All', ...new Set(DICTIONARY.map(e => e.domain))].sort();
const domSide = document.getElementById('domain-filter-side');
allDomains.forEach(d => {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (d === 'All' ? ' active' : '');
  b.textContent = d; b.dataset.dom = d;
  b.addEventListener('click', () => {
    activeDomain = d;
    domSide.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x.dataset.dom === d));
    render();
  });
  domSide.appendChild(b);
});

const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', e => { searchQ = e.target.value.toLowerCase(); render(); });
if (TARGET) { searchInput.value = TARGET; searchQ = TARGET.toLowerCase(); }

function filtered() {
  return DICTIONARY.filter(e => {
    const q = searchQ;
    const activeForm = (e.langs[activeLang] || '').toLowerCase();
    const matchQ = !q
      || activeForm.includes(q)
      || e.gloss.toLowerCase().includes(q)
      || Object.values(e.langs).some(v => v.toLowerCase().includes(q));
    return matchQ && (activeDomain === 'All' || e.domain === activeDomain);
  });
}

const alphaDiv = document.getElementById('alpha-index');
function buildAlpha(entries) {
  const letters = new Set(entries.map(e => (e.langs[activeLang] || e.hw)[0].toUpperCase()));
  alphaDiv.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    const a = document.createElement('a');
    a.textContent = l;
    if (letters.has(l)) a.href = '#letter-' + l;
    else a.className = 'inactive';
    alphaDiv.appendChild(a);
  });
}

// ── Etymology HTML ────────────────────────────────────────────
function etymHTML(etym) {
  if (!etym) return '';
  return `<a class="etym-tag" href="${etym.tlopo}" target="_blank" title="Proto-Oceanic etymology — The Lexicon of Proto Oceanic">
    <span class="etym-prefix">POc</span>
    <span class="etym-form">${etym.label.replace(/^POc\s*/,'')}</span>
  </a>
  <a class="etymograph-link" href="${etym.etymograph}" target="_blank" title="View in Etymograph — semantic evolution network">
    <img src="etymograph_icon.png" alt="Etymograph network">
  </a>`;
}

// ── Contextual example ────────────────────────────────────────
function buildEntryExample(entryId) {
  const ex     = NEGATION_EXAMPLE;
  const cols   = ex.cols;
  const ownCol = cols.findIndex(c => c.dictId === entryId);

  const langRows = ex.rows.map(row => {
    const color = LANG_COLORS[row.lang] || '#888';
    const abbr  = LANG_ABBR[row.lang]  || row.lang;
    const cells = cols.map((col, i) => {
      const f = row.forms[i] ?? '';
      if (f === '') return `<td class="ex-form-cell ex-empty">—</td>`;
      if (i === ownCol) {
        return `<td class="ex-form-cell ex-own">
          <strong style="font-family:'EB Garamond',serif;font-size:1.15rem;
                         color:${color};font-weight:700;
                         border-bottom:2px solid ${color};padding:0 2px;">${f}</strong>
        </td>`;
      }
      return `<td class="ex-form-cell">
        <a class="lexlink" href="#${col.dictId}" data-dict-id="${col.dictId}"
           style="font-family:'EB Garamond',serif;font-size:1.15rem;color:var(--ink);
                  text-decoration:none;border-bottom:1.5px dotted var(--gold);
                  border-radius:2px;padding:0 2px;
                  transition:color 0.15s,border-color 0.15s,background 0.15s;">${f}</a>
      </td>`;
    }).join('');
    return `<tr><td class="ex-lang-abbr" style="color:${color};">${abbr}</td>${cells}</tr>`;
  }).join('');

  const sepCells  = '<td></td>' + cols.map(() => '<td></td>').join('');
  const glossCells = cols.map(col => `<td class="ex-gloss-cell">${col.gl}</td>`).join('');

  return `<div class="entry-example-block">
    <div class="entry-example-label">Example</div>
    <div class="entry-example-wrap">
      <table class="entry-ex-table">
        ${langRows}
        <tr class="ex-sep-row">${sepCells}</tr>
        <tr><td class="ex-gloss-abbr"></td>${glossCells}</tr>
      </table>
      <div class="entry-ex-transl">${ex.translation}</div>
      <a class="grammar-ref" style="margin-top:6px;" href="grammar.html#s1">
        📐 See in Comparative Grammar →
      </a>
    </div>
  </div>`;
}

// ── Entry HTML ────────────────────────────────────────────────
function entryHTML(e) {
  const hl        = (e.id === TARGET || e.hw === TARGET) ? ' highlighted' : '';
  const displayHw = e.langs[activeLang] || e.hw;
  const hwColor   = LANG_COLORS[activeLang] || 'var(--ink)';

  const langCols = ['Nume','Dorig','Koro','Olrat','Lakon'].map(ln =>
    `<th><span class="lang-dot" style="background:${LANG_DOTS[ln]}"></span>${ln}</th>`
  ).join('');
  const langVals = ['Nume','Dorig','Koro','Olrat','Lakon'].map(ln => {
    const form     = e.langs[ln] || '—';
    const isActive = ln === activeLang;
    return form === '—'
      ? `<td style="color:#ccc">—</td>`
      : `<td style="${isActive ? 'font-weight:600;' : ''}">
           <a class="lexlink" data-dict-id="${e.id}" href="#${e.id}"
              style="font-family:'EB Garamond',serif;font-size:1.1rem;
                     color:${isActive ? hwColor : 'var(--ink)'};
                     text-decoration:none;border-bottom:1.5px dotted var(--gold);
                     border-radius:2px;padding:0 2px;
                     transition:color 0.15s,border-color 0.15s,background 0.15s;">${form}</a>
         </td>`;
  }).join('');

  // Etymology row — only rendered when e.etym exists
  const etymRow = e.etym
    ? `<div class="entry-header" style="margin-top:0.25rem;margin-bottom:0.55rem;">
         ${etymHTML(e.etym)}
       </div>`
    : '';

  return `<div class="entry${hl}" id="${e.id}">
    <div class="entry-header">
      <span class="headword" style="color:${hwColor};">${displayHw}</span>
      <span class="pos-tag">${e.pos}</span>
      <span class="domain-tag">${e.domain}</span>
    </div>
    ${etymRow}
    <div class="entry-gloss">${e.glossRich}</div>
    <table class="lang-table">
      <thead><tr>${langCols}</tr></thead>
      <tbody><tr>${langVals}</tr></tbody>
    </table>
    <div class="entry-notes">${e.notes}</div>
    ${buildEntryExample(e.id)}
  </div>`;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  const entries = filtered();
  const content = document.getElementById('dict-content');
  document.getElementById('result-count').textContent =
    entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies') +
    ' · headword language: ' + activeLang;

  if (!entries.length) {
    content.innerHTML = '<div class="no-results">No entries found.</div>';
    buildAlpha([]); return;
  }
  buildAlpha(entries);

  const groups = {};
  entries.forEach(e => {
    const form = e.langs[activeLang] || e.hw;
    const l    = form[0].toUpperCase();
    if (!groups[l]) groups[l] = [];
    groups[l].push(e);
  });
  Object.values(groups).forEach(g =>
    g.sort((a, b) => (a.langs[activeLang] || a.hw).localeCompare(b.langs[activeLang] || b.hw))
  );

  content.innerHTML = Object.keys(groups).sort().map(l =>
    `<div class="letter-group" id="letter-${l}">
      <div class="letter-heading" style="border-color:${LANG_COLORS[activeLang]};">${l}</div>
      ${groups[l].map(entryHTML).join('')}
    </div>`
  ).join('');

  const hl = content.querySelector('.highlighted');
  if (hl) setTimeout(() => hl.scrollIntoView({ behavior:'smooth', block:'center' }), 120);
}
render();

document.querySelector('.dict-main').addEventListener('scroll', () => {
  let active = null;
  document.querySelectorAll('.letter-group').forEach(g => {
    if (g.getBoundingClientRect().top < 160) active = g.id.replace('letter-','');
  });
  alphaDiv.querySelectorAll('a:not(.inactive)').forEach(a =>
    a.classList.toggle('active', a.textContent === active)
  );
});

const tooltip = document.getElementById('lex-tooltip');
const ttHw    = document.getElementById('tt-hw');
const ttPos   = document.getElementById('tt-pos');
const ttGloss = document.getElementById('tt-gloss');
let hideTimer = null;

function positionTooltip(el) {
  const rect = el.getBoundingClientRect(), tw = 300, ttH = tooltip.offsetHeight || 80, gap = 10;
  let left = rect.left + rect.width / 2 - 20;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  if (left < 8) left = 8;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = (rect.top - ttH - gap < 8) ? (rect.bottom + gap) + 'px' : (rect.top - ttH - gap) + 'px';
}

document.addEventListener('mouseover', e => {
  const a = e.target.closest('a.lexlink');
  if (!a) return;
  const id    = a.dataset.dictId || (a.getAttribute('href') || '').split('#')[1];
  const entry = id && DICT_MAP[id];
  if (!entry) return;
  clearTimeout(hideTimer);
  ttHw.textContent    = entry.hw;
  ttPos.textContent   = '  ' + entry.pos;
  ttGloss.textContent = entry.gloss;
  tooltip.classList.add('visible');
  positionTooltip(a);
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('a.lexlink'))
    hideTimer = setTimeout(() => tooltip.classList.remove('visible'), 80);
});
document.addEventListener('mousemove', e => {
  if (!tooltip.classList.contains('visible')) return;
  const a = e.target.closest('a.lexlink');
  if (a) positionTooltip(a);
});
</script>
</body>
</html>
